<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Novo Auxílio - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-wrapper">
    <div class="container" style="max-width:720px;">

        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-box-seam-fill me-2 text-primary"></i> Novo Auxílio
            </h1>
            <p class="page-subtitle">
                Registrando auxílio para <strong th:text="${pessoa.nome}"></strong>
            </p>
        </div>

        <div class="form-card">
            <form th:action="@{/pessoas/{id}/auxilios(id=${pessoa.id})}" th:object="${auxilio}" method="post">

                <div class="section-title">
                    <i class="bi bi-info-circle-fill text-primary"></i> Dados do Auxílio
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Tipo do Auxílio <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{tipoAuxilio}"
                                th:classappend="${#fields.hasErrors('tipoAuxilio')} ? 'is-invalid'">
                            <option value="">Selecione um tipo...</option>
                            <option th:each="tipo : ${tiposAuxilio}"
                                    th:value="${tipo.descricao}"
                                    th:text="${tipo.descricao}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('tipoAuxilio')}" th:errors="*{tipoAuxilio}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Data de Entrega <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{dataEntrega}"
                               th:classappend="${#fields.hasErrors('dataEntrega')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('dataEntrega')}" th:errors="*{dataEntrega}"></div>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label">Descrição</label>
                        <input type="text" class="form-control" th:field="*{descricao}" placeholder="Descreva brevemente o auxílio...">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Valor Estimado (R$) <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" class="form-control" th:field="*{valorEstimado}" placeholder="0,00" min="0"
                               th:classappend="${#fields.hasErrors('valorEstimado')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('valorEstimado')}" th:errors="*{valorEstimado}"></div>
                    </div>
                </div>

                <div class="d-flex gap-2 flex-wrap pt-2 border-top">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy2-fill"></i> Salvar Auxílio
                    </button>
                    <a th:href="@{/pessoas/{id}/auxilios(id=${pessoa.id})}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
