<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Auxílio - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <h1 class="mb-4">Novo Auxílio para <span th:text="${pessoa.nome}"></span></h1>

    <form th:action="@{/pessoas/{id}/auxilios(id=${pessoa.id})}" th:object="${auxilio}" method="post" class="row g-3">

        <div class="col-md-6">
            <label class="form-label">Tipo do Auxílio</label>
            <select class="form-select" th:field="*{tipoAuxilio}"
                    th:classappend="${#fields.hasErrors('tipoAuxilio')} ? 'is-invalid'">
                <option value="">Selecione...</option>
                <option th:each="tipo : ${tiposAuxilio}" th:value="${tipo.descricao}" th:text="${tipo.descricao}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('tipoAuxilio')}" th:errors="*{tipoAuxilio}"></div>
        </div>

        <div class="col-md-6">
            <label class="form-label">Data de Entrega</label>
            <input type="date" class="form-control" th:field="*{dataEntrega}"
                   th:classappend="${#fields.hasErrors('dataEntrega')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('dataEntrega')}" th:errors="*{dataEntrega}"></div>
        </div>

        <div class="col-md-8">
            <label class="form-label">Descrição</label>
            <input type="text" class="form-control" th:field="*{descricao}">
        </div>

        <div class="col-md-4">
            <label class="form-label">Valor Estimado</label>
            <input type="number" step="0.01" class="form-control" th:field="*{valorEstimado}"
                   th:classappend="${#fields.hasErrors('valorEstimado')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('valorEstimado')}" th:errors="*{valorEstimado}"></div>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a th:href="@{/pessoas/{id}/auxilios(id=${pessoa.id})}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
