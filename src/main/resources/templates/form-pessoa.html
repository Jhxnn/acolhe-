<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pessoa.id == null} ? 'Nova Pessoa - Acolhe+' : 'Editar Pessoa - Acolhe+'">Pessoa - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-wrapper">
    <div class="container" style="max-width:860px;">

        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-person-fill me-2" th:classappend="${pessoa.id == null} ? 'text-success' : 'text-warning'" style="font-size:1.5rem;"></i>
                <span th:text="${pessoa.id == null} ? 'Nova Pessoa' : 'Editar Pessoa'">Pessoa</span>
            </h1>
            <p class="page-subtitle" th:text="${pessoa.id == null} ? 'Preencha os dados para cadastrar um novo beneficiário' : 'Atualize as informações do beneficiário'"></p>
        </div>

        <div class="form-card">
            <form th:action="${pessoa.id == null} ? @{/pessoas} : @{/pessoas/editar/{id}(id=${pessoa.id})}"
                  th:object="${pessoa}" method="post">

                <div class="section-title">
                    <i class="bi bi-person-vcard-fill text-primary"></i> Dados Pessoais
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-7">
                        <label class="form-label">Nome completo <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{nome}" placeholder="Nome do beneficiário"
                               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                    </div>

                    <div class="col-md-5">
                        <label class="form-label">CPF <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{cpf}" id="cpf" placeholder="000.000.000-00"
                               th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Idade <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" th:field="*{idade}" placeholder="0" min="0"
                               th:classappend="${#fields.hasErrors('idade')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('idade')}" th:errors="*{idade}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Telefone <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{telefone}" id="telefone" placeholder="(00) 00000-0000"
                               th:classappend="${#fields.hasErrors('telefone')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></div>
                    </div>

                    <div class="col-md-5">
                        <label class="form-label">Endereço</label>
                        <input type="text" class="form-control" th:field="*{endereco}" placeholder="Rua, número, bairro">
                    </div>
                </div>

                <div class="section-title">
                    <i class="bi bi-currency-dollar text-success"></i> Situação Socioeconômica
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Qtd. de Dependentes <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" th:field="*{quantidadeDependentes}" placeholder="0" min="0"
                               th:classappend="${#fields.hasErrors('quantidadeDependentes')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidadeDependentes')}" th:errors="*{quantidadeDependentes}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Renda Mensal (R$) <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" class="form-control" th:field="*{rendaMensal}" placeholder="0,00" min="0"
                               th:classappend="${#fields.hasErrors('rendaMensal')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('rendaMensal')}" th:errors="*{rendaMensal}"></div>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <div class="p-3 rounded-3 w-100" style="background:#f0f9f4; border:1.5px solid #b7e4c7;">
                            <div class="form-check mb-0">
                                <input type="checkbox" class="form-check-input" th:field="*{recebeAuxilio}" id="recebeAuxilio">
                                <label class="form-check-label fw-semibold" for="recebeAuxilio" style="color:#0a9e5f;">
                                    <i class="bi bi-check-circle-fill me-1"></i>Recebe Auxílio
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 flex-wrap pt-2 border-top">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy2-fill"></i>
                        <span th:text="${pessoa.id == null} ? 'Cadastrar Pessoa' : 'Salvar Alterações'">Salvar</span>
                    </button>
                    <a href="/pessoas" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/imask"></script>
<script>
    IMask(document.getElementById('cpf'), { mask: '000.000.000-00' });
    IMask(document.getElementById('telefone'), {
        mask: [
            { mask: '(00) 0000-0000' },
            { mask: '(00) 00000-0000' }
        ]
    });
</script>
</body>
</html>
