<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pessoa.id == null} ? 'Nova Pessoa - Acolhe+' : 'Editar Pessoa - Acolhe+'">Pessoa - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <h1 class="mb-4" th:text="${pessoa.id == null} ? 'Nova Pessoa' : 'Editar Pessoa'">Pessoa</h1>

    <form th:action="${pessoa.id == null} ? @{/pessoas} : @{/pessoas/editar/{id}(id=${pessoa.id})}"
          th:object="${pessoa}" method="post" class="row g-3">

        <div class="col-md-6">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" th:field="*{nome}"
                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
        </div>

        <div class="col-md-6">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" th:field="*{cpf}"
                   th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></div>
        </div>

        <div class="col-md-3">
            <label class="form-label">Idade</label>
            <input type="number" class="form-control" th:field="*{idade}"
                   th:classappend="${#fields.hasErrors('idade')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('idade')}" th:errors="*{idade}"></div>
        </div>

        <div class="col-md-4">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control" th:field="*{telefone}"
                   th:classappend="${#fields.hasErrors('telefone')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></div>
        </div>

        <div class="col-md-5">
            <label class="form-label">Endereço</label>
            <input type="text" class="form-control" th:field="*{endereco}">
        </div>

        <div class="col-md-4">
            <label class="form-label">Quantidade de Dependentes</label>
            <input type="number" class="form-control" th:field="*{quantidadeDependentes}"
                   th:classappend="${#fields.hasErrors('quantidadeDependentes')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidadeDependentes')}" th:errors="*{quantidadeDependentes}"></div>
        </div>

        <div class="col-md-4">
            <label class="form-label">Renda Mensal</label>
            <input type="number" step="0.01" class="form-control" th:field="*{rendaMensal}"
                   th:classappend="${#fields.hasErrors('rendaMensal')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('rendaMensal')}" th:errors="*{rendaMensal}"></div>
        </div>

        <div class="col-md-4 d-flex align-items-center">
            <div class="form-check mt-4">
                <input type="checkbox" class="form-check-input" th:field="*{recebeAuxilio}">
                <label class="form-check-label">Recebe Auxílio</label>
            </div>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="/pessoas" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/imask"></script>
<script>
    IMask(document.getElementById('cpf'), { mask: '000.000.000-00' });

    IMask(document.getElementById('telefone'), {
        mask: [
            { mask: '(00) 0000-0000' },
            { mask: '(00) 00000-0000' }
        ]
    });
</script>
</body>
</html>
