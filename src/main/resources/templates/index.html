<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <h1 class="mb-4">Dashboard</h1>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card text-bg-primary h-100">
                <div class="card-body">
                    <h6 class="card-title">Total de Pessoas Cadastradas</h6>
                    <p class="card-text fs-2" th:text="${totalPessoas}">0</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-success h-100">
                <div class="card-body">
                    <h6 class="card-title">Recebem Auxílio</h6>
                    <p class="card-text fs-2" th:text="${totalRecebemAuxilio}">0</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-secondary h-100">
                <div class="card-body">
                    <h6 class="card-title">Não Recebem Auxílio</h6>
                    <p class="card-text fs-2" th:text="${totalNaoRecebemAuxilio}">0</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-info h-100">
                <div class="card-body">
                    <h6 class="card-title">Média de Renda Mensal</h6>
                    <p class="card-text fs-2">R$ <span th:text="${mediaRenda}">0.00</span></p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-warning h-100">
                <div class="card-body">
                    <h6 class="card-title">Total de Auxílios Entregues</h6>
                    <p class="card-text fs-2" th:text="${totalAuxilios}">0</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-dark h-100">
                <div class="card-body">
                    <h6 class="card-title">Valor Total Distribuído</h6>
                    <p class="card-text fs-2">R$ <span th:text="${valorTotalDistribuido}">0.00</span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
