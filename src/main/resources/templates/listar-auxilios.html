<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Auxílios - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1>Auxílios de <span th:text="${pessoa.nome}"></span></h1>
        </div>
        <div>
            <a th:href="@{/pessoas/{id}/auxilios/novo(id=${pessoa.id})}" class="btn btn-primary">+ Novo Auxílio</a>
            <a href="/pessoas" class="btn btn-outline-secondary">Voltar</a>
        </div>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Valor Estimado</th>
            <th>Data de Entrega</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="auxilio : ${auxilios}">
            <td th:text="${auxilio.tipoAuxilio}"></td>
            <td th:text="${auxilio.descricao}"></td>
            <td>R$ <span th:text="${auxilio.valorEstimado}"></span></td>
            <td th:text="${#temporals.format(auxilio.dataEntrega, 'dd/MM/yyyy')}"></td>
            <td>
                <a th:href="@{/pessoas/{id}/auxilios/excluir/{auxilioId}(id=${pessoa.id},auxilioId=${auxilio.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Tem certeza que deseja excluir este auxílio?');">Excluir</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(auxilios)}">
            <td colspan="5" class="text-center text-muted">Nenhum auxílio registrado para esta pessoa.</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
