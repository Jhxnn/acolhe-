<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pessoas Cadastradas - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Pessoas Cadastradas</h1>
        <a href="/pessoas/novo" class="btn btn-primary">+ Nova Pessoa</a>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Idade</th>
            <th>Telefone</th>
            <th>Renda Mensal</th>
            <th>Recebe Auxílio</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="pessoa : ${pessoas}">
            <td th:text="${pessoa.nome}"></td>
            <td th:text="${pessoa.cpf}"></td>
            <td th:text="${pessoa.idade}"></td>
            <td th:text="${pessoa.telefone}"></td>
            <td>R$ <span th:text="${pessoa.rendaMensal}"></span></td>
            <td>
                <span th:if="${pessoa.recebeAuxilio}" class="badge bg-success">Sim</span>
                <span th:unless="${pessoa.recebeAuxilio}" class="badge bg-secondary">Não</span>
            </td>
            <td>
                <a th:href="@{/pessoas/editar/{id}(id=${pessoa.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/pessoas/{id}/auxilios(id=${pessoa.id})}" class="btn btn-sm btn-info">Ver Auxílios</a>
                <a th:href="@{/pessoas/excluir/{id}(id=${pessoa.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Tem certeza que deseja excluir esta pessoa?');">Excluir</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(pessoas)}">
            <td colspan="7" class="text-center text-muted">Nenhuma pessoa cadastrada.</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
