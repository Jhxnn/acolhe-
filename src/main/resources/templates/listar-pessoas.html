<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pessoas Cadastradas - Acolhe+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-wrapper">
    <div class="container">

        <div class="page-header d-flex align-items-start justify-content-between flex-wrap gap-3">
            <div>
                <h1 class="page-title"><i class="bi bi-people-fill me-2" style="color:#4361ee;"></i>Pessoas Cadastradas</h1>
                <p class="page-subtitle">Gerencie todos os beneficiários cadastrados no sistema</p>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <a href="/relatorio/pdf" target="_blank" class="btn btn-danger">
                    <i class="bi bi-file-earmark-pdf-fill"></i> Exportar PDF
                </a>
                <a href="/pessoas/novo" class="btn btn-primary">
                    <i class="bi bi-person-plus-fill"></i> Nova Pessoa
                </a>
            </div>
        </div>

        <div class="content-card">
            <div class="content-card-header">
                <h2 class="content-card-title">
                    <i class="bi bi-table text-primary"></i>
                    Lista de Beneficiários
                </h2>
                <div class="search-bar" style="min-width:240px;">
                    <i class="bi bi-search"></i>
                    <input type="text" class="form-control form-control-sm" id="searchInput"
                           placeholder="Buscar por nome ou CPF...">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-custom" id="tabelaPessoas">
                    <thead>
                    <tr>
                        <th>Pessoa</th>
                        <th>Idade</th>
                        <th>Telefone</th>
                        <th>Dependentes</th>
                        <th>Renda Mensal</th>
                        <th>Status</th>
                        <th>Cadastro</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="tabelaBody">
                    <tr th:each="pessoa : ${pessoas}">
                        <td>
                            <div class="person-name" th:text="${pessoa.nome}"></div>
                            <div class="person-cpf" th:text="${pessoa.cpf}"></div>
                        </td>
                        <td th:text="${pessoa.idade + ' anos'}"></td>
                        <td th:text="${pessoa.telefone}"></td>
                        <td th:text="${pessoa.quantidadeDependentes}"></td>
                        <td class="renda-value">R$ <span th:text="${#numbers.formatDecimal(pessoa.rendaMensal, 1, 'POINT', 2, 'COMMA')}"></span></td>
                        <td>
                            <span th:if="${pessoa.recebeAuxilio}" class="badge-status badge-sim">
                                <i class="bi bi-check-circle-fill me-1"></i>Recebe
                            </span>
                            <span th:unless="${pessoa.recebeAuxilio}" class="badge-status badge-nao">
                                <i class="bi bi-dash-circle me-1"></i>Não recebe
                            </span>
                        </td>
                        <td th:text="${pessoa.dataCadastro != null ? #temporals.format(pessoa.dataCadastro, 'dd/MM/yyyy') : '-'}" style="font-size:0.82rem; color:#94a3b8;"></td>
                        <td>
                            <div class="actions-group">
                                <a th:href="@{/pessoas/editar/{id}(id=${pessoa.id})}" class="btn btn-sm btn-warning" title="Editar">
                                    <i class="bi bi-pencil-fill"></i> Editar
                                </a>
                                <a th:href="@{/pessoas/{id}/auxilios(id=${pessoa.id})}" class="btn btn-sm btn-info" title="Ver auxílios">
                                    <i class="bi bi-box-seam-fill"></i> Auxílios
                                </a>
                                <a th:href="@{/pessoas/excluir/{id}(id=${pessoa.id})}" class="btn btn-sm btn-danger" title="Excluir"
                                   onclick="return confirm('Tem certeza que deseja excluir esta pessoa?');">
                                    <i class="bi bi-trash3-fill"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div th:if="${#lists.isEmpty(pessoas)}" class="empty-state">
                    <div class="empty-state-icon"><i class="bi bi-people"></i></div>
                    <p class="empty-state-text">Nenhuma pessoa cadastrada ainda.</p>
                    <a href="/pessoas/novo" class="btn btn-primary mt-2">
                        <i class="bi bi-person-plus-fill"></i> Cadastrar agora
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('searchInput').addEventListener('input', function () {
        const q = this.value.toLowerCase();
        document.querySelectorAll('#tabelaBody tr').forEach(function (tr) {
            const text = tr.innerText.toLowerCase();
            tr.style.display = text.includes(q) ? '' : 'none';
        });
    });
</script>
</body>
</html>
